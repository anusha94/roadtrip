<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Baby Road Trip 🍼</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: white;
      padding: 12px 16px 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: space-between;
    }
    #header h1 { font-size: 17px; font-weight: 700; color: #1c1c1e; }
    #header p { font-size: 12px; color: #8e8e93; margin-top: 1px; }

    #legend {
      display: flex; gap: 12px; align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #3c3c43; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .legend-dot.planned { background: #34C759; }
    .legend-dot.backup { background: #FF9500; }

    #map {
      position: fixed;
      top: 64px; bottom: 72px;
      left: 0; right: 0;
    }

    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: white;
      padding: 10px 16px;
      box-shadow: 0 -1px 6px rgba(0,0,0,0.1);
      display: flex; gap: 10px;
    }

    #nearest-btn {
      flex: 1;
      background: #007AFF; color: white;
      border: none; border-radius: 12px;
      padding: 14px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #nearest-btn:active { opacity: 0.8; }

    #plan-btn {
      background: #F2F2F7; color: #1c1c1e;
      border: none; border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    #plan-btn:active { opacity: 0.8; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: 240px !important; }

    .popup-inner { padding: 14px 14px 12px; }
    .popup-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 8px; border-radius: 20px; margin-bottom: 6px;
      text-transform: uppercase;
    }
    .popup-badge.planned { background: #d1f5d3; color: #1a7a2a; }
    .popup-badge.backup { background: #ffe5c0; color: #a05000; }
    .popup-name { font-size: 16px; font-weight: 700; color: #1c1c1e; margin-bottom: 2px; }
    .popup-road { font-size: 12px; color: #8e8e93; margin-bottom: 4px; }
    .popup-facilities { font-size: 12px; color: #3c3c43; margin-bottom: 12px; line-height: 1.5; }

    .nav-buttons { display: flex; gap: 8px; }
    .nav-btn {
      flex: 1; padding: 9px 6px;
      border-radius: 10px;
      text-align: center;
      font-size: 13px; font-weight: 600;
      text-decoration: none;
      display: block;
    }
    .waze-btn { background: #09CBE5; color: white; }
    .gmaps-btn { background: #4285F4; color: white; }

    /* Plan panel */
    #plan-panel {
      display: none;
      position: fixed; top: 64px; bottom: 72px; left: 0; right: 0;
      z-index: 900; background: #f5f5f7;
      overflow-y: auto; padding: 12px 16px;
    }
    #plan-panel.open { display: block; }
    .plan-title { font-size: 13px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 8px; }
    .stop-card {
      background: white; border-radius: 12px; padding: 12px 14px;
      margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;
    }
    .stop-card-dot {
      width: 14px; height: 14px; border-radius: 50%; margin-top: 3px; flex-shrink: 0;
    }
    .stop-card-dot.planned { background: #34C759; }
    .stop-card-dot.backup { background: #FF9500; }
    .stop-card-name { font-size: 15px; font-weight: 600; color: #1c1c1e; }
    .stop-card-sub { font-size: 12px; color: #8e8e93; margin-top: 1px; }
    .stop-card-nav { display: flex; gap: 6px; margin-top: 8px; }
    .stop-card-nav a {
      font-size: 12px; font-weight: 600; padding: 5px 12px;
      border-radius: 8px; text-decoration: none;
    }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>Baby Road Trip 🍼</h1>
    <p>Heemstede → Colmar · 11 Mar</p>
  </div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot planned"></div> Feeding</div>
    <div class="legend-item"><div class="legend-dot backup"></div> Backup</div>
  </div>
</div>

<div id="map"></div>

<div id="plan-panel">
  <div class="plan-title">Planned Stops</div>
  <div id="planned-list"></div>
  <div class="plan-title">Backup Stops</div>
  <div id="backup-list"></div>
</div>

<div id="bottom-bar">
  <button id="nearest-btn">📍 Nearest Stop</button>
  <button id="plan-btn">List</button>
</div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────

  const plannedStops = [
    {
      name: "De Wuust (La Place)",
      road: "A73 · 5808 PA Oirlo",
      facilities: "La Place restaurant · Baby changing · Petrol · Toilet",
      time: "Stop 1 · ~10:45am",
      lat: 51.505, lon: 6.022,
      type: "planned"
    },
    {
      name: "Brohltal West (Serways)",
      road: "A61 · 56651 Niederzissen",
      facilities: "Restaurant · Burger King · Baby changing · Shower · EV charging",
      time: "Stop 2 · ~1:30pm",
      lat: 50.440, lon: 7.223,
      type: "planned"
    },
    {
      name: "Wonnegau West (Serways)",
      road: "A61, km 340 · 67551 Worms",
      facilities: "Restaurant · Petrol · Baby changing · EV charging · 24h",
      time: "Stop 3 · ~3:30pm",
      lat: 49.646, lon: 8.293,
      type: "planned"
    }
  ];

  const backupStops = [
    // Netherlands: Heemstede → Venlo
    { name: "De Schaars (Shell)",     road: "A12/A50 · Arnhem",           facilities: "Petrol · Shop · Toilet",                     lat: 52.025, lon: 5.879, type: "backup" },
    { name: "Hondsiep (Shell)",       road: "A73 · 5443 ZG Haps",         facilities: "Petrol · EV charging · Toilet",               lat: 51.670, lon: 5.855, type: "backup" },
    { name: "Spik (BP)",              road: "A73 · 6042 WZ Roermond",     facilities: "BP · Wild Bean Cafe · EV charging · Toilet",  lat: 51.192, lon: 6.031, type: "backup" },
    // Germany: A61 Venlo → Landau
    { name: "Bedburger Land West",    road: "A61 · 50181 Bedburg",        facilities: "McDonald's · Petrol · Toilet",                lat: 51.005, lon: 6.519, type: "backup" },
    { name: "Moseltal West (Serways)",road: "A61 · 56333 Winningen",      facilities: "Coffee Fellows · Toilet · EV charging",       lat: 50.310, lon: 7.570, type: "backup" },
    { name: "Hunsrück West (Serways)",road: "A61 · 55442 Daxweiler",      facilities: "Restaurant · Playground · Baby changing",     lat: 49.990, lon: 7.650, type: "backup" },
    { name: "Dannstadt Ost",          road: "A61 · 67125 Dannstadt",      facilities: "Petrol · Food · Toilet · EV charging",        lat: 49.410, lon: 8.342, type: "backup" },
    // France: Landau → Colmar
    { name: "McDonald's Mulhouse",    road: "A35 · Mulhouse",             facilities: "McDonald's · Baby changing · Toilet · Seating", lat: 47.750, lon: 7.340, type: "backup" },
  ];

  const allStops = [...plannedStops, ...backupStops];

  // ── Route ─────────────────────────────────────────────────────────────

  const routePoints = [
    [52.359, 4.617],  // Heemstede
    [52.368, 4.904],  // Amsterdam
    [52.091, 5.121],  // Utrecht
    [51.985, 5.899],  // Arnhem
    [51.833, 6.250],  // Emmerich (NL/DE border)
    [51.470, 6.851],  // Oberhausen
    [51.072, 7.003],  // Ohligser Heide (Stop 1)
    [50.933, 6.950],  // Cologne
    [50.353, 7.579],  // Koblenz
    [50.130, 8.530],  // Frankfurt area
    [49.680, 8.618],  // Bergstraße (Stop 2)
    [49.006, 8.404],  // Karlsruhe
    [48.762, 8.242],  // Baden-Baden
    [47.999, 7.842],  // Freiburg
    [48.012, 7.550],  // Breisach (Rhine crossing)
    [48.079, 7.359],  // Colmar
  ];

  // ── Map setup ─────────────────────────────────────────────────────────

  const map = L.map('map', { zoomControl: false }).setView([50.2, 7.5], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>'
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);

  // ── Google Maps route ──────────────────────────────────────────────────
  // Heemstede → Arnhem → Nijmegen → Venlo → A61 → Landau → Strasbourg → Colmar: 710km
  const directRoute = [
    [52.360, 4.606], [52.372, 4.711], [52.309, 4.822], [52.284, 4.949],
    [52.063, 5.067], [52.065, 5.362], [52.015, 5.649], [52.022, 5.803],
    [51.985, 5.899], [51.843, 5.865], [51.736, 5.845], [51.385, 6.121],
    [51.370, 6.168], [51.306, 6.231], [51.268, 6.356], [51.102, 6.424],
    [51.056, 6.499], [51.032, 6.469], [50.928, 6.669], [50.650, 6.931],
    [50.572, 7.137], [50.505, 7.222], [50.395, 7.246], [50.390, 7.368],
    [50.340, 7.509], [50.234, 7.515], [50.192, 7.587], [50.091, 7.605],
    [49.999, 7.684], [49.924, 7.830], [49.928, 7.939], [49.880, 7.951],
    [49.782, 8.106], [49.715, 8.139], [49.655, 8.286], [49.444, 8.322],
    [49.367, 8.201], [49.200, 8.116], [49.089, 8.213], [49.032, 8.204],
    [48.749, 7.919], [48.681, 7.808], [48.675, 7.733], [48.573, 7.752],
    [48.528, 7.689], [48.520, 7.581], [48.453, 7.508], [48.331, 7.498],
    [48.253, 7.413], [48.075, 7.366]
  ];

  L.polyline(directRoute, {
    color: '#007AFF', weight: 4, opacity: 0.85
  }).addTo(map).bindTooltip('Google Maps route via Arnhem · Nijmegen · Venlo · Landau · Strasbourg (710km)', { sticky: true });

  // ── Deviation from direct route polyline ──────────────────────────────
  const KM_LAT = 111.0;

  // Distance from point P to segment AB, returns { km, foot }
  function pointToSegment(pLat, pLon, aLat, aLon, bLat, bLon) {
    const cosLat = Math.cos((pLat + aLat) / 2 * Math.PI / 180);
    const KM_LON = 111.0 * cosLat;
    const ax = 0, ay = 0;
    const bx = (bLon - aLon) * KM_LON, by = (bLat - aLat) * KM_LAT;
    const px = (pLon - aLon) * KM_LON, py = (pLat - aLat) * KM_LAT;
    const len2 = bx * bx + by * by;
    const t = len2 === 0 ? 0 : Math.max(0, Math.min(1, (px * bx + py * by) / len2));
    const fx = t * bx, fy = t * by;
    const dx = px - fx, dy = py - fy;
    return {
      km: Math.sqrt(dx * dx + dy * dy),
      foot: { lat: aLat + fy / KM_LAT, lon: aLon + fx / (111.0 * Math.cos(aLat * Math.PI / 180)) }
    };
  }

  // Minimum distance from point to any segment of the direct route polyline
  function deviationFromRoute(pLat, pLon) {
    let best = { km: Infinity, foot: null };
    for (let i = 0; i < directRoute.length - 1; i++) {
      const [aLat, aLon] = directRoute[i];
      const [bLat, bLon] = directRoute[i + 1];
      const r = pointToSegment(pLat, pLon, aLat, aLon, bLat, bLon);
      if (r.km < best.km) best = r;
    }
    return { km: Math.round(best.km), foot: best.foot };
  }

  // Pre-compute deviations and draw drop lines for all stops
  allStops.forEach(stop => {
    const { km, foot } = deviationFromRoute(stop.lat, stop.lon);
    stop.deviation = km;
    // Extra driving time: detour there and back at ~100km/h
    const extraMin = Math.round(km * 2 / 100 * 60);
    stop.extraTime = extraMin < 1 ? 'on route' : `~${extraMin} min extra`;
    const color = stop.type === 'planned' ? '#34C759' : '#FF9500';
    L.polyline([[stop.lat, stop.lon], [foot.lat, foot.lon]], {
      color, weight: 1.5, opacity: 0.7, dashArray: '4 4'
    }).addTo(map);
  });

  // ── Icons ─────────────────────────────────────────────────────────────

  function makeIcon(html, size) {
    return L.divIcon({ className: '', html, iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2] });
  }

  const plannedIcon = makeIcon(
    `<div style="background:#34C759;color:white;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">🍼</div>`, 34
  );
  const backupIcon = makeIcon(
    `<div style="background:#FF9500;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.25);">P</div>`, 24
  );
  const startIcon = makeIcon(
    `<div style="background:#007AFF;color:white;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,0.25);">🏠</div>`, 30
  );
  const endIcon = makeIcon(
    `<div style="background:#FF3B30;color:white;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,0.25);">🏨</div>`, 30
  );

  // ── Popup builder ─────────────────────────────────────────────────────

  function navLinks(stop) {
    const wazeUrl = `https://waze.com/ul?ll=${stop.lat},${stop.lon}&navigate=yes`;
    const gmapsUrl = `https://maps.google.com/maps?daddr=${stop.lat},${stop.lon}`;
    return `
      <div class="nav-buttons">
        <a class="nav-btn waze-btn" href="${wazeUrl}" target="_blank">Waze</a>
        <a class="nav-btn gmaps-btn" href="${gmapsUrl}" target="_blank">Google Maps</a>
      </div>`;
  }

  function popupContent(stop) {
    return `
      <div class="popup-inner">
        <span class="popup-badge ${stop.type}">${stop.type === 'planned' ? 'Planned stop' : 'Backup stop'}</span>
        <div class="popup-name">${stop.name}</div>
        <div class="popup-road">${stop.road}</div>
        ${stop.time ? `<div class="popup-road" style="color:#007AFF;font-weight:600;">${stop.time}</div>` : ''}
        ${stop.deviation != null ? `<div class="popup-road" style="color:#8e8e93;">↗ ${stop.deviation} km off route · ${stop.extraTime}</div>` : ''}
        <div class="popup-facilities">${stop.facilities}</div>
        ${navLinks(stop)}
      </div>`;
  }

  // ── Place markers ─────────────────────────────────────────────────────

  L.marker([52.361, 4.606], { icon: startIcon })
    .bindPopup('<div class="popup-inner"><div class="popup-name">23 Schollevaarlaan</div><div class="popup-road">2106DB Heemstede · Start · 9:00am</div></div>')
    .addTo(map);

  L.marker([48.075, 7.366], { icon: endIcon })
    .bindPopup('<div class="popup-inner"><div class="popup-name">6 Rue Schickelé</div><div class="popup-road">68000 Colmar · Destination</div></div>')
    .addTo(map);

  const markerRefs = allStops.map(stop => {
    const icon = stop.type === 'planned' ? plannedIcon : backupIcon;
    const marker = L.marker([stop.lat, stop.lon], { icon })
      .bindPopup(popupContent(stop), { maxWidth: 260 })
      .addTo(map);
    return { ...stop, marker };
  });

  // ── Plan list panel ───────────────────────────────────────────────────

  function buildList(stops, containerId) {
    const container = document.getElementById(containerId);
    stops.forEach((stop, i) => {
      const wazeUrl = `https://waze.com/ul?ll=${stop.lat},${stop.lon}&navigate=yes`;
      const gmapsUrl = `https://maps.google.com/maps?daddr=${stop.lat},${stop.lon}`;
      const card = document.createElement('div');
      card.className = 'stop-card';
      card.innerHTML = `
        <div class="stop-card-dot ${stop.type}"></div>
        <div style="flex:1">
          <div class="stop-card-name">${stop.name}</div>
          <div class="stop-card-sub">${stop.road}</div>
          ${stop.time ? `<div class="stop-card-sub" style="color:#007AFF;font-weight:600;">${stop.time}</div>` : ''}
          ${stop.deviation != null ? `<div class="stop-card-sub" style="color:#8e8e93;">↗ ${stop.deviation} km off route · ${stop.extraTime}</div>` : ''}
          <div class="stop-card-sub">${stop.facilities}</div>
          <div class="stop-card-nav">
            <a href="${wazeUrl}" target="_blank" style="background:#09CBE5;color:white;" class="nav-btn">Waze</a>
            <a href="${gmapsUrl}" target="_blank" style="background:#4285F4;color:white;" class="nav-btn">Google Maps</a>
          </div>
        </div>`;
      card.querySelector('.stop-card-name').addEventListener('click', () => {
        document.getElementById('plan-panel').classList.remove('open');
        document.getElementById('plan-btn').textContent = 'List';
        map.setView([stop.lat, stop.lon], 13);
        markerRefs[plannedStops.indexOf(stop) > -1
          ? plannedStops.indexOf(stop)
          : plannedStops.length + backupStops.indexOf(stop)].marker.openPopup();
      });
      container.appendChild(card);
    });
  }

  buildList(plannedStops, 'planned-list');
  buildList(backupStops, 'backup-list');

  // ── Plan toggle ───────────────────────────────────────────────────────

  document.getElementById('plan-btn').addEventListener('click', () => {
    const panel = document.getElementById('plan-panel');
    const btn = document.getElementById('plan-btn');
    const isOpen = panel.classList.toggle('open');
    btn.textContent = isOpen ? 'Map' : 'List';
  });

  // ── Nearest stop ──────────────────────────────────────────────────────

  document.getElementById('nearest-btn').addEventListener('click', () => {
    const btn = document.getElementById('nearest-btn');
    if (!navigator.geolocation) {
      alert('Geolocation is not supported on this device.');
      return;
    }
    btn.textContent = 'Locating…';
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        btn.textContent = '📍 Nearest Stop';
        btn.disabled = false;
        const { latitude, longitude } = pos.coords;

        // Close plan panel if open
        document.getElementById('plan-panel').classList.remove('open');
        document.getElementById('plan-btn').textContent = 'List';

        let nearest = null;
        let minDist = Infinity;
        markerRefs.forEach(stop => {
          const d = Math.hypot(stop.lat - latitude, stop.lon - longitude);
          if (d < minDist) { minDist = d; nearest = stop; }
        });
        if (nearest) {
          map.setView([nearest.lat, nearest.lon], 13);
          nearest.marker.openPopup();
        }
      },
      err => {
        btn.textContent = '📍 Nearest Stop';
        btn.disabled = false;
        alert('Could not get your location. Please allow location access in Safari settings.');
      },
      { timeout: 10000 }
    );
  });
</script>
</body>
</html>
